name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  linux:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Test (full run-all suite)
        run: make test

      - name: Sanitizers
        run: |
          make clean
          make debug
          bash tests/run.sh
          bash tests/adversarial/run.sh

      - name: Cross-backend diff
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bash tests/test_transpiler_diff.sh

      - name: Performance baseline guard
        continue-on-error: true
        run: |
          # Re-run benches against benchmarks/baseline.json. Reports
          # regressions but does not fail CI: shared runners are too
          # noisy on the sub-millisecond startup bench to make this
          # blocking. Local `make bench-compare` (with TOLERANCE=0.25)
          # is the gate for actual regressions.
          make bench-compare TOLERANCE=2.0 || true

      - name: Fuzz (short budget)
        id: fuzz
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y clang
          make fuzz-parser FUZZ_CC=clang
          mkdir -p corpus
          cp examples/*.xs corpus/ 2>/dev/null || true
          cp tests/conformance/*.xs corpus/ 2>/dev/null || true
          # Full ASan + LSan + UBSan. -timeout=20 trips on pathological
          # inputs early so the budget gets spent on coverage instead
          # of a single slow seed; -timeout_exitcode=0 lets libFuzzer
          # save the reproducer (uploaded below) without failing CI on
          # parse-time blowups, which are perf bugs rather than memory
          # safety issues. shared runners are too noisy to gate on
          # crashes/leaks; the artifact upload below preserves any
          # finding for offline triage.
          ./fuzz_parser -max_total_time=60 -timeout=20 -timeout_exitcode=0 \
                        -rss_limit_mb=4096 corpus/
      - name: Upload fuzz reproducers
        if: always() && steps.fuzz.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-repro
          path: |
            crash-*
            timeout-*
            oom-*
            leak-*
          if-no-files-found: ignore
          retention-days: 7

  macos:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: make
      - run: make test

  windows:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make diffutils
      - name: Build
        shell: msys2 {0}
        run: make
      - name: Test
        shell: msys2 {0}
        run: make test

  wasm:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wasi-sdk
        run: |
          WASI_VERSION_FULL=25.0
          curl -sL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz | tar xz
          sudo mv wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux /opt/wasi-sdk
      - name: Install wasmtime
        run: |
          curl -sL https://github.com/bytecodealliance/wasmtime/releases/download/v25.0.0/wasmtime-v25.0.0-x86_64-linux.tar.xz | tar xJ
          sudo cp wasmtime-v25.0.0-x86_64-linux/wasmtime /usr/local/bin/
      - name: Build WASM
        run: make wasm
      - name: Build native xs (needed for test orchestration helpers)
        run: make
      - name: Conformance suite through wasm
        run: |
          pass=0; fail=0
          for f in tests/conformance/*.xs; do
              name=$(basename "$f" .xs)
              out=$(wasmtime run --dir . xs.wasm -- --interp "$f" 2>&1); rc=$?
              if [ $rc -eq 0 ] && echo "$out" | grep -q "CONFORMANCE OK"; then
                  pass=$((pass + 1))
                  echo "  ok    $name (wasm)"
              else
                  fail=$((fail + 1))
                  echo "  FAIL  $name (wasm)"
                  echo "$out" | sed 's/^/        /'
              fi
          done
          echo "[wasm-conformance] $pass passed, $fail failed"
          [ $fail -eq 0 ]
      - name: Regression corpus through wasm
        run: |
          pass=0; fail=0
          for f in tests/regression/*.xs; do
              name=$(basename "$f" .xs)
              out=$(wasmtime run --dir . xs.wasm -- --interp "$f" 2>&1); rc=$?
              if [ $rc -eq 0 ]; then
                  pass=$((pass + 1))
                  echo "  ok    $name (wasm)"
              else
                  fail=$((fail + 1))
                  echo "  FAIL  $name (wasm)"
                  echo "$out" | sed 's/^/        /'
              fi
          done
          echo "[wasm-regression] $pass passed, $fail failed"
          [ $fail -eq 0 ]

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
      XS_MINISIGN_PASSWORD: ${{ secrets.XS_MINISIGN_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: xs-linux-x86_64
          - os: macos-latest
            name: xs-macos-x86_64
          - os: windows-latest
            name: xs-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Build release (Unix)
        if: runner.os != 'Windows'
        run: make release

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make release

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv xs ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv xs.exe ${{ matrix.name }}

      - name: Zip Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.name }} -DestinationPath xs-windows-x86_64.zip

      - name: Generate SHA256 checksums (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Generate SHA256 checksums (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          sha256sum xs-windows-x86_64.zip > xs-windows-x86_64.zip.sha256

      - name: Install minisign (Linux)
        if: runner.os == 'Linux' && env.XS_MINISIGN_KEY != ''
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
        run: sudo apt-get install -y minisign

      - name: Install minisign (macOS)
        if: runner.os == 'macOS' && env.XS_MINISIGN_KEY != ''
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
        run: brew install minisign

      - name: Install minisign (Windows)
        if: runner.os == 'Windows' && env.XS_MINISIGN_KEY != ''
        shell: msys2 {0}
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
        run: pacman -S --noconfirm mingw-w64-x86_64-minisign

      - name: Sign binary (Unix)
        if: runner.os != 'Windows' && env.XS_MINISIGN_KEY != ''
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
          XS_MINISIGN_PASSWORD: ${{ secrets.XS_MINISIGN_PASSWORD }}
        run: |
          printf '%s' "$XS_MINISIGN_KEY" > /tmp/minisign.key
          chmod 600 /tmp/minisign.key
          echo "$XS_MINISIGN_PASSWORD" | minisign -S -s /tmp/minisign.key -m ${{ matrix.name }} -t "xs release"
          rm -f /tmp/minisign.key

      - name: Sign binary (Windows)
        if: runner.os == 'Windows' && env.XS_MINISIGN_KEY != ''
        shell: msys2 {0}
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
          XS_MINISIGN_PASSWORD: ${{ secrets.XS_MINISIGN_PASSWORD }}
        run: |
          printf '%s' "$XS_MINISIGN_KEY" > /tmp/minisign.key
          chmod 600 /tmp/minisign.key
          echo "$XS_MINISIGN_PASSWORD" | minisign -S -s /tmp/minisign.key -m ${{ matrix.name }} -t "xs release"
          echo "$XS_MINISIGN_PASSWORD" | minisign -S -s /tmp/minisign.key -m xs-windows-x86_64.zip -t "xs release"
          rm -f /tmp/minisign.key

      - name: Upload to release (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
            ${{ matrix.name }}.minisig

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
            ${{ matrix.name }}.minisig
            xs-windows-x86_64.zip
            xs-windows-x86_64.zip.sha256
            xs-windows-x86_64.zip.minisig

  release-wasm:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
      XS_MINISIGN_PASSWORD: ${{ secrets.XS_MINISIGN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Install wasi-sdk
        run: |
          WASI_VERSION_FULL=25.0
          curl -sL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz | tar xz
          sudo mv wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux /opt/wasi-sdk
      - name: Install binaryen for wasm-opt
        run: sudo apt-get install -y binaryen
      - name: Build WASM (full + browser-optimised)
        run: |
          make wasm
          make wasm-browser
      - name: Generate SHA256s
        run: |
          sha256sum xs.wasm > xs.wasm.sha256
          sha256sum xs-browser.wasm > xs-browser.wasm.sha256
      - name: Sign artefacts
        if: env.XS_MINISIGN_KEY != ''
        env:
          XS_MINISIGN_KEY: ${{ secrets.XS_MINISIGN_KEY }}
          XS_MINISIGN_PASSWORD: ${{ secrets.XS_MINISIGN_PASSWORD }}
        run: |
          sudo apt-get install -y minisign
          printf '%s' "$XS_MINISIGN_KEY" > /tmp/minisign.key
          chmod 600 /tmp/minisign.key
          echo "$XS_MINISIGN_PASSWORD" | minisign -S -s /tmp/minisign.key -m xs.wasm -t "xs release"
          echo "$XS_MINISIGN_PASSWORD" | minisign -S -s /tmp/minisign.key -m xs-browser.wasm -t "xs release (browser)"
          rm -f /tmp/minisign.key
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xs.wasm
            xs.wasm.sha256
            xs.wasm.minisig
            xs-browser.wasm
            xs-browser.wasm.sha256
            xs-browser.wasm.minisig
      - name: Notify static repo
        if: env.XS_STATIC_DISPATCH_TOKEN != ''
        env:
          XS_STATIC_DISPATCH_TOKEN: ${{ secrets.XS_STATIC_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $XS_STATIC_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xs-lang0/static/dispatches \
            -d '{"event_type":"release"}' || true
