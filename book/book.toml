[book]
title = "The XS Programming Language"
authors = ["xs-lang0"]
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/xs-lang0/xs"
edit-url-template = "https://github.com/xs-lang0/xs/edit/main/book/{path}"
site-url = "/book/"

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true
